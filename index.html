<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#033343" />
    <meta name="description" content="All On Deck – Premium Marine Deck Flooring, Custom CAD Designs, CNC Manufacturing, and Precision Installation in Florida." />
    <title>All On Deck – Marine Deck Flooring</title>

    <!-- Open Graph Default Fallbacks -->
    <meta property="og:title" content="All On Deck – Marine Deck Flooring" />
    <meta property="og:description" content="Premium Marine Deck Flooring, Custom CAD Designs, CNC Manufacturing, and Precision Installation in Florida." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/assets/images/1.jpg" />

    <!-- Twitter Card Fallbacks -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="All On Deck – Marine Deck Flooring" />
    <meta name="twitter:description" content="Premium Marine Deck Flooring, Custom CAD Designs, CNC Manufacturing, and Precision Installation in Florida." />
    <meta name="twitter:image" content="/assets/images/1.jpg" />

    <!-- Preload logo SVG -->
    <link rel="preload" as="image" href="/favicon.svg" fetchpriority="high" />
  </head>
  <body className="bg-[#033343]">
    <div id="root">
      <!-- Static shell: first paint before JS. React replaces this on mount. -->
      <div
        style="
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          background: #033343;
          color: #ffffff;
        "
      >
        <header
          style="
            height: 4rem;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(3, 51, 67, 0.95);
            display: flex;
            align-items: center;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
          "
        >
          <img
            src="/favicon.svg"
            alt="All On Deck"
            width="140"
            height="36"
            fetchpriority="high"
            style="
              height: 36px;
              width: auto;
              max-width: 140px;
              object-fit: contain;
              object-position: left;
            "
          />
        </header>
        <main
          style="
            flex: 1;
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
            padding: 1.5rem 1rem;
          "
        >
          <div
            style="
              height: 1.25rem;
              width: 12rem;
              max-width: 100%;
              background: rgba(255, 255, 255, 0.1);
              border-radius: 0.375rem;
            "
            aria-hidden="true"
          ></div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
